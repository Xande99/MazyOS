<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--du-ink);padding:28px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-text);font-weight:700;font-size:15px;padding:14px 24px;border-radius:999px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .pink{background:var(--du-pink);color:#fff;box-shadow:var(--shadow-pink)}
  .lime{background:var(--du-lime);color:var(--du-ink)}
  .ghost{background:transparent;color:#F4F8FF;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.28)}
</style></head><body>
  <button class="btn pink">Solicitar orçamento ↗</button>
  <button class="btn lime">Falar no WhatsApp</button>
  <button class="btn ghost">Ver trabalhos</button>
</body></html>
