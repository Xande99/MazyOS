<!-- @dsCard group="Type" viewport="700x210" name="Body & labels" subtitle="Regular 400 text, eyebrow labels, tags" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--du-cream);padding:24px;color:var(--text-body)}
  .eyebrow{font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--du-pink);display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .eyebrow::before{content:"";width:26px;height:2px;background:var(--du-pink)}
  p{margin:0 0 12px;max-width:60ch;font-size:17px;line-height:1.6}
  .tags{display:flex;gap:8px}
  .tag{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;background:#fff;border:1px solid var(--du-line);color:var(--text-body)}
  b{color:var(--du-blue)}
</style></head><body>
  <div class="eyebrow">Nossos serviços</div>
  <p>Corpo em <b>Bricolage Grotesque Regular</b> a 17px, altura de linha 1.6. Tom direto e criativo, sem ser arrogante — fala com <b>você</b>, na medida.</p>
  <div class="tags"><span class="tag">Meta Ads</span><span class="tag">Branding</span><span class="tag">Reels</span><span class="tag">No-code</span></div>
</body></html>
