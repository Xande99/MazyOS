<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="Core brand colors" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--du-cream);padding:20px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:104px}
  .chip{height:64px;border-radius:14px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .name{font-weight:700;font-size:13px;color:var(--du-blue);margin-top:8px}
  .hex{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#FD4B90"></div><div class="name">Pink</div><div class="hex">#FD4B90</div></div>
  <div class="sw"><div class="chip" style="background:#123047"></div><div class="name">Blue</div><div class="hex">#123047</div></div>
  <div class="sw"><div class="chip" style="background:#020E20"></div><div class="name">Ink</div><div class="hex">#020E20</div></div>
  <div class="sw"><div class="chip" style="background:#DFFF5A"></div><div class="name">Lime</div><div class="hex">#DFFF5A</div></div>
  <div class="sw"><div class="chip" style="background:#81DFC0"></div><div class="name">Aqua</div><div class="hex">#81DFC0</div></div>
  <div class="sw"><div class="chip" style="background:#F7F4F1"></div><div class="name">Cream</div><div class="hex">#F7F4F1</div></div>
</div>
</body></html>
