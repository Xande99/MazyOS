<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & motion" subtitle="Corner radii + signature easing" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--du-cream);padding:22px;color:var(--du-blue)}
  .row{display:flex;gap:20px;align-items:flex-end}
  .box{background:var(--du-pink);width:64px;height:64px}
  .lbl{font-size:11px;color:var(--text-muted);margin-top:7px;text-align:center}
  .ease{flex:1;margin-left:8px}
  .track{height:8px;border-radius:999px;background:#fff;border:1px solid var(--du-line);position:relative;overflow:hidden}
  .dot{position:absolute;top:-4px;left:0;width:16px;height:16px;border-radius:50%;background:var(--du-aqua);animation:run 2.4s var(--ease-out-expo) infinite}
  @keyframes run{0%{left:0}60%,100%{left:calc(100% - 16px)}}
  .ec{font-size:12px;color:var(--text-muted);margin-top:8px}
</style></head><body>
  <div class="row">
    <div><div class="box" style="border-radius:8px"></div><div class="lbl">sm · 8</div></div>
    <div><div class="box" style="border-radius:14px"></div><div class="lbl">md · 14</div></div>
    <div><div class="box" style="border-radius:20px"></div><div class="lbl">lg · 20</div></div>
    <div><div class="box" style="border-radius:28px"></div><div class="lbl">xl · 28</div></div>
    <div><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div></div>
    <div class="ease"><div class="track"><span class="dot"></span></div><div class="ec">cubic-bezier(0.16, 1, 0.3, 1) · 250–400ms</div></div>
  </div>
</body></html>
