<!-- @dsCard group="Colors" viewport="700x160" name="Roles & usage" subtitle="How the palette is applied" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-text);background:var(--du-cream);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .card{border-radius:14px;padding:16px;font-size:13px;line-height:1.45}
  .light{background:#fff;border:1px solid var(--du-line);color:var(--text-body)}
  .dark{background:var(--du-ink);color:var(--text-body-dark)}
  h4{margin:0 0 6px;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
  .light h4{color:var(--du-pink)}.dark h4{color:var(--du-aqua)}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-weight:700;font-size:11px;margin:3px 3px 0 0}
</style></head><body>
<div class="grid">
  <div class="card light"><h4>Pink — Ação</h4>CTAs, links ativos, destaque principal.<br><span class="pill" style="background:#FD4B90;color:#fff">Botão</span><span class="pill" style="background:#FFE3EE;color:#FD4B90">Badge</span></div>
  <div class="card dark"><h4>Lime + Aqua</h4>Acentos sobre fundo escuro: badges, ícones, bordas.<br><span class="pill" style="background:#DFFF5A;color:#020E20">Lime</span><span class="pill" style="background:rgba(129,223,192,.16);color:#81DFC0">Aqua</span></div>
  <div class="card light"><h4>Blue — Texto</h4>Títulos sobre fundo claro. Ink para seções escuras.<br><span class="pill" style="background:#123047;color:#fff">Heading</span></div>
</div>
</body></html>
