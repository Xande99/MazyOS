[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Baseline de headers de seguranca -- mesmo conjunto aplicado no starter-tipo-b
# (achado Medio da auditoria: nenhum projeto tinha header nenhum configurado).
# CSP fica de fora de proposito -- ja avaliado e descartado pra esse starter
# por conflitar com View Transitions/ClientRouter (ver .claude/decisions.md).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
